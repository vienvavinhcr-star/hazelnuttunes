<!DOCTYPE html>
<html lang="vi">
<head>

   <script async defer src="https://tools.luckyorange.com/core/lo.js?site-id=4c9d6a18"></script>
   
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAZELNUTTUNES — Giá sỉ phần mềm bản quyền</title>
<meta name="description" content="HAZELNUTTUNES — Nâng cấp YouTube Premium, Netflix, ChatGPT, Spotify giá sỉ. Uy tín để chọn, chất lượng để tin. Nâng cấp trước, trả sau.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MÀU SẮC & KIỂU CHỮ (COLORS & TYPE) — sửa ở đây để đổi màu
   ============================================================ */
:root{
  --midnight:#070B18; --panel:#111936; --panel-2:#17214A;
  --line:rgba(233,180,76,.18);
  --gold:#E9B44C; --gold-deep:#C68A2E;
  --cream:#FFF4DD; --ink:#241706; --muted:#9EABD2; --ok:#7BD88F;
  --glass:rgba(17,25,54,.68); --glow:rgba(233,180,76,.20);
  --radius:18px;
  --display:'Baloo 2',system-ui,sans-serif;
  --body:'Be Vietnam Pro',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);color:var(--cream);background:var(--midnight);
  background-image:
    radial-gradient(760px 460px at 82% -12%, rgba(233,180,76,.16), transparent 64%),
    radial-gradient(620px 420px at 4% 22%, rgba(65,111,255,.16), transparent 62%),
    linear-gradient(180deg, rgba(255,255,255,.025), transparent 260px);
  min-height:100vh;line-height:1.6}
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:58px 58px;mask-image:linear-gradient(180deg,#000,transparent 78%)}
img{max-width:100%;display:block}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:rgba(7,11,24,.78);border-bottom:1px solid rgba(255,255,255,.08)}
.topbar .wrap{display:flex;align-items:center;gap:10px;padding:10px 20px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;letter-spacing:.04em;font-size:1.02rem;color:var(--cream)}
.brand img{width:38px;height:38px}
.topbar nav{margin-left:auto;display:flex;gap:8px;align-items:center}
.pillbtn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;font-weight:600;font-size:.9rem;border:1px solid rgba(255,255,255,.10);color:var(--cream);background:rgba(255,255,255,.035);transition:.2s}
.pillbtn:hover{background:rgba(255,255,255,.075);border-color:rgba(233,180,76,.30)}
.pillbtn.gold{background:linear-gradient(180deg,#FFD978,var(--gold-deep));color:var(--ink);border:none;box-shadow:0 8px 24px rgba(233,180,76,.28), inset 0 1px 0 rgba(255,255,255,.45)}
.pillbtn.gold:hover{filter:brightness(1.06)}
.langbtn{border:1px solid var(--line);background:var(--panel);color:var(--cream);border-radius:999px;padding:7px 14px;font-weight:700;font-size:.82rem;letter-spacing:.05em}
.langbtn:hover{background:var(--panel-2)}
@media(max-width:560px){.topbar .navtext{display:none}}

/* ---------- hero ---------- */
.hero{padding:60px 0 36px;text-align:center;position:relative}
.coin{width:165px;height:165px;margin:0 auto 18px;filter:drop-shadow(0 14px 30px rgba(233,180,76,.35));animation:bob 5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.eyebrow{display:inline-block;font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(233,180,76,.28);border-radius:999px;padding:6px 16px;margin-bottom:16px;background:rgba(233,180,76,.07);box-shadow:0 0 28px rgba(233,180,76,.08)}
h1{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5.5vw,3.3rem);line-height:1.12}
h1 .g{background:linear-gradient(180deg,#F7DFA5,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.tagline{color:var(--muted);max-width:580px;margin:14px auto 26px;font-size:1.02rem}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.discount-strip{display:none;margin:20px auto 0;max-width:520px;background:rgba(123,216,143,.1);border:1px dashed rgba(123,216,143,.45);color:var(--ok);border-radius:12px;padding:10px 16px;font-size:.9rem;font-weight:600}
.discount-strip.show{display:block}

/* ---------- steps ---------- */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:42px 0 6px}
.step{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:20px 18px;text-align:left;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.step b{font-family:var(--display);font-size:1.02rem;display:block;margin:8px 0 4px}
.step p{font-size:.9rem;color:var(--muted)}
.stepnum{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#F3C868,var(--gold-deep));color:var(--ink);font-family:var(--display);font-weight:800}

/* ---------- sections / products ---------- */
section{padding:40px 0}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;flex-wrap:wrap}
h2{font-family:var(--display);font-weight:800;font-size:clamp(1.4rem,3vw,1.85rem)}
.sec-head span{color:var(--muted);font-size:.92rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(17,25,54,.50));border:1px solid rgba(255,255,255,.085);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:10px;transition:.22s;position:relative;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.05)}
.card:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.07),transparent 32%);opacity:.55}
.card:hover{transform:translateY(-5px);border-color:rgba(233,180,76,.42);box-shadow:0 22px 52px rgba(0,0,0,.38),0 0 0 1px rgba(233,180,76,.08)}
.card .icon{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:1.5rem;background:rgba(233,180,76,.12);border:1px solid var(--line);overflow:hidden}
.card .icon svg{width:30px;height:30px}
.card .icon.brand{border:none;box-shadow:0 8px 22px rgba(0,0,0,.36)}
.trust-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.trust-tag{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);color:#DDE6FF;border-radius:999px;padding:4px 9px;font-size:.72rem;font-weight:700;line-height:1.2}
.trust-tag:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px rgba(123,216,143,.72)}
.modal-trust{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 14px}

/* ---------- banner "còn nhiều app nữa" ---------- */
.more-banner{margin-top:20px;border:1px solid var(--line);border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(233,180,76,.08),rgba(60,90,200,.10));
  overflow:hidden}
.more-inner{display:flex;align-items:center;gap:18px;padding:22px 24px;flex-wrap:wrap}
.more-icon{font-size:2rem;flex-shrink:0}
.more-inner > div:nth-child(2){flex:1;min-width:200px}
.more-inner b{font-family:var(--display);font-size:1.05rem;display:block;margin-bottom:4px}
.more-inner p{color:var(--muted);font-size:.88rem;margin:0}
.more-btns{display:flex;gap:10px;flex-wrap:wrap}
.more-btns .pillbtn{padding:10px 18px;font-size:.88rem}
.card.featured{
  grid-column:span 2;
  background:
    linear-gradient(180deg, rgba(43,27,32,.92), rgba(15,22,48,.92)) padding-box,
    linear-gradient(135deg,#FF4E45,#F3C868,#7C5CFF) border-box;
  border:2px solid transparent;
  box-shadow:0 22px 60px rgba(255,60,60,.18), 0 0 0 1px rgba(233,180,76,.12);
}
.card.featured:before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(420px 200px at 85% 0%, rgba(255,70,60,.22), transparent 65%)}
.card.featured:hover{transform:translateY(-4px);box-shadow:0 22px 54px rgba(255,60,60,.3)}
.card.featured .badge{background:linear-gradient(135deg,#FF4E45,#F3C868);color:#2B0E0E;border:none;font-size:.72rem;padding:5px 12px;box-shadow:0 4px 12px rgba(255,70,60,.4)}
.card.featured .price{font-size:1.5rem}
.card.featured h3{font-size:1.3rem}
@media(max-width:600px){.card.featured{grid-column:span 1}}
.card h3{font-family:var(--display);font-size:1.12rem;font-weight:700}
.card .desc{color:var(--muted);font-size:.88rem;flex:1}
.price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.price{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--gold)}
.oldprice{color:var(--muted);text-decoration:line-through;font-size:.85rem;font-weight:500}
.per{color:var(--muted);font-size:.8rem}
.badge{position:absolute;top:14px;right:14px;font-size:.68rem;font-weight:700;letter-spacing:.06em;background:rgba(123,216,143,.14);color:var(--ok);border:1px solid rgba(123,216,143,.35);padding:4px 10px;border-radius:999px}
.card .pillbtn{justify-content:center;margin-top:4px}
.card-price-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:24px}
.saving{display:inline-flex;align-items:center;gap:5px;color:var(--ok);font-size:.78rem;font-weight:700;background:rgba(123,216,143,.1);border:1px solid rgba(123,216,143,.28);padding:3px 9px;border-radius:999px}

/* ---------- hero social proof & app marquee ---------- */
.hero-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;max-width:720px;margin:28px auto 0}
.hero-stat{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 12px 34px rgba(0,0,0,.18)}
.hero-stat strong{display:block;font-family:var(--display);font-size:1.45rem;line-height:1.1;color:var(--gold)}
.hero-stat span{display:block;color:var(--muted);font-size:.76rem;margin-top:4px}
.app-marquee{max-width:880px;margin:26px auto 0;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.03);padding:12px 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.app-marquee:before,.app-marquee:after{content:"";position:absolute;top:0;bottom:0;width:70px;z-index:2;pointer-events:none}
.app-marquee:before{left:0;background:linear-gradient(90deg,var(--midnight),transparent)}
.app-marquee:after{right:0;background:linear-gradient(-90deg,var(--midnight),transparent)}
.marquee-track{display:flex;width:max-content;gap:12px;animation:marquee 32s linear infinite}
.app-marquee:hover .marquee-track{animation-play-state:paused}
.marquee-item{display:flex;align-items:center;gap:9px;flex:0 0 auto;min-width:148px;padding:8px 12px;border-radius:12px;background:rgba(10,17,40,.55);border:1px solid rgba(233,180,76,.12);font-size:.82rem;font-weight:600;color:var(--cream)}
.marquee-item .icon{width:34px;height:34px;border-radius:10px;flex-shrink:0}
.marquee-item .icon svg{width:21px;height:21px}
@keyframes marquee{to{transform:translateX(calc(-50% - 6px))}}

/* ---------- product search & filter ---------- */
.product-tools{display:grid;grid-template-columns:minmax(0,1fr) 210px;gap:12px;margin:-4px 0 18px}
.searchbox{position:relative}
.searchbox:before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-52%);color:var(--gold);font-size:1.25rem;pointer-events:none}
.searchbox .field{padding-left:42px;margin:0}
.product-sort{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);background-position:calc(100% - 18px) 50%,calc(100% - 12px) 50%;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:38px}
.need-filters{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.need-chip{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);color:var(--cream);border-radius:999px;padding:8px 12px;font-weight:700;font-size:.78rem;cursor:pointer;transition:.16s}
.need-chip:hover{border-color:rgba(233,180,76,.36);background:rgba(255,255,255,.065)}
.need-chip.active{border-color:var(--gold);background:rgba(233,180,76,.13);color:var(--gold)}
.product-meta{grid-column:1/-1;color:var(--muted);font-size:.8rem;margin-top:-4px}
.no-results{grid-column:1/-1;text-align:center;padding:34px 20px;border:1px dashed var(--line);border-radius:var(--radius);color:var(--muted);background:rgba(20,30,72,.35)}

/* ---------- order process ---------- */
.process-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.process-card{border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);background:linear-gradient(180deg,rgba(20,30,72,.70),rgba(10,17,40,.48));padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.process-num{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#F3C868,var(--gold-deep));color:var(--ink);font-family:var(--display);font-weight:800;margin-bottom:12px}
.process-card b{font-family:var(--display);font-size:1rem}
.process-card p{color:var(--muted);font-size:.86rem;margin-top:5px}
.process-alert{margin-top:14px;border:1px dashed rgba(233,180,76,.34);background:rgba(233,180,76,.08);border-radius:14px;padding:12px;color:#FFE7AA;font-size:.88rem;font-weight:700}

/* ---------- testimonials ---------- */
.testimonials{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.review{background:linear-gradient(180deg,rgba(20,30,72,.72),rgba(20,30,72,.45));border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:13px}
.review-stars{color:var(--gold);letter-spacing:.08em;font-size:.95rem}
.review-text{color:var(--cream);font-size:.9rem;flex:1}
.review-person{display:flex;align-items:center;gap:10px}
.review-avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#7C5CFF);color:#10162F;font-family:var(--display);font-weight:800;border:2px solid rgba(255,255,255,.18);overflow:hidden}
.review-avatar img{width:100%;height:100%;object-fit:cover}
.review-person b{display:block;font-size:.88rem}
.review-person span{display:block;color:var(--muted);font-size:.75rem}

/* ---------- scroll reveal ---------- */
.reveal{opacity:1;transform:none}
.motion-ready .reveal{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s cubic-bezier(.2,.7,.2,1)}
.motion-ready .reveal.is-visible{opacity:1;transform:none}

/* ---------- floating actions ---------- */
.floating-contact{position:fixed;right:18px;bottom:88px;z-index:70;display:grid;gap:10px}
.float-btn,.back-top{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.2);color:#fff;font-weight:800;box-shadow:0 10px 28px rgba(0,0,0,.38);transition:.2s}
.float-btn:hover,.back-top:hover{transform:translateY(-3px);filter:brightness(1.08)}
.float-btn.messenger{background:#1877F2}
.float-btn.zalo-float{background:#0068FF}
.back-top{position:fixed;right:18px;bottom:28px;z-index:70;background:var(--panel-2);font-size:1.1rem;opacity:0;visibility:hidden;transform:translateY(8px);cursor:pointer}
.back-top.show{opacity:1;visibility:visible;transform:none}
.mobile-cta{display:none}
.recent-order{position:fixed;left:18px;bottom:22px;z-index:72;display:flex;align-items:center;gap:11px;max-width:min(340px,calc(100vw - 36px));padding:12px 14px;border-radius:16px;background:rgba(9,13,28,.86);border:1px solid rgba(255,255,255,.10);box-shadow:0 18px 42px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(16px);opacity:0;transform:translateY(12px);pointer-events:none;transition:.28s}
.recent-order.show{opacity:1;transform:translateY(0)}
.recent-dot{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#7C5CFF);color:#10162F;font-family:var(--display);font-weight:800;box-shadow:0 8px 22px rgba(0,0,0,.28)}
.recent-copy{font-size:.82rem;line-height:1.35;color:var(--cream)}
.recent-copy b{display:block;color:var(--gold);font-size:.86rem}
.recent-copy span{color:var(--muted)}

/* ---------- benefits ---------- */
.trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.trust .t{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.trust .t b{font-family:var(--display)}
.trust .t p{color:var(--muted);font-size:.88rem;margin-top:4px}

/* ---------- confidence section ---------- */
.confidence-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;align-items:stretch}
.explain-card,.warranty-card{border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);background:linear-gradient(180deg,rgba(20,30,72,.72),rgba(12,18,40,.52));padding:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.explain-card h3,.warranty-card h3{font-family:var(--display);font-size:1.12rem;margin-bottom:8px}
.explain-card p,.warranty-card p{color:var(--muted);font-size:.9rem}
.reason-list{display:grid;gap:10px;margin-top:16px}
.reason-item{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start;padding:12px;border-radius:14px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)}
.reason-icon{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:rgba(233,180,76,.13);color:var(--gold);font-weight:800}
.reason-item b{display:block;font-size:.92rem}
.reason-item span{display:block;color:var(--muted);font-size:.8rem;margin-top:2px}
.warranty-steps{display:grid;gap:10px;margin-top:16px}
.warranty-step{display:flex;gap:10px;align-items:flex-start;color:var(--cream);font-size:.88rem}
.warranty-step i{font-style:normal;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:rgba(123,216,143,.12);color:var(--ok);font-size:.78rem;font-weight:800;flex-shrink:0}
.warranty-note{margin-top:16px;border:1px dashed rgba(123,216,143,.34);background:rgba(123,216,143,.08);color:#DDFBE5;border-radius:14px;padding:12px;font-size:.85rem;font-weight:700}

/* ---------- FAQ ---------- */
.faq details{border:1px solid var(--line);border-radius:14px;background:rgba(20,30,72,.5);margin-bottom:10px;overflow:hidden}
.faq summary{cursor:pointer;list-style:none;padding:16px 18px;font-weight:600;font-size:.98rem;display:flex;align-items:center;gap:10px}
.faq summary::-webkit-details-marker{display:none}
.faq summary:before{content:"＋";color:var(--gold);font-weight:800;font-family:var(--display)}
.faq details[open] summary:before{content:"－"}
.faq .ans{padding:0 18px 16px 44px;color:var(--muted);font-size:.9rem}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);padding:30px 0 44px;color:var(--muted);font-size:.88rem;text-align:center}
footer .brand{justify-content:center;margin-bottom:8px}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,9,24,.74);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141D3F,#0D142D);border:1px solid rgba(255,255,255,.10);border-radius:22px 22px 0 0;width:min(560px,100%);max-height:92vh;overflow:auto;padding:26px 24px 30px;position:relative;animation:slideup .28s ease;box-shadow:0 28px 80px rgba(0,0,0,.48)}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.modal{border-radius:22px}}
.modal .close{position:absolute;top:14px;right:14px;background:var(--panel-2);border:1px solid var(--line);color:var(--cream);width:36px;height:36px;border-radius:50%;font-size:1rem;z-index:2}
.modal h3{font-family:var(--display);font-size:1.32rem;margin-bottom:4px}

function iconTile(key){
  const b = ICONS[key];
  if (b && b.svg) return `<div class="icon brand" style="background:${b.bg}">${b.svg}</div>`;
  if (b && b.img) return `<div class="icon brand" style="background:${b.bg}"><img src="${b.img}" style="width:100%;height:100%;object-fit:${b.fit || 'contain'};padding:${b.pad || '0'};border-radius:${b.radius || '14px'};box-sizing:border-box" alt=""></div>`;
  return `<div class="icon">${key}</div>`;   // emoji fallback
}

/* ---------- sản phẩm / products ---------- */
let productQuery = "";
let productSort = "default";
let productNeed = "all";
const cheapestPlan = p => p.plans.reduce((best, pl) => pl.price < best.price ? pl : best, p.plans[0]);
const NEED_FILTERS = [
  { key:"all", label:"needAll" },
  { key:"movies", label:"needMovies" },
  { key:"music", label:"needMusic" },
  { key:"english", label:"needEnglish" },
  { key:"ai", label:"needAi" },
  { key:"creative", label:"needCreative" },
  { key:"office", label:"needOffice" }
];
function productNeeds(product){
  const text = [product.icon, product.name.vi, product.name.en, product.desc.vi, product.desc.en, ...(product.details?.vi || []), ...(product.details?.en || [])].join(" ").toLowerCase();
  const icon = product.icon;
  const needs = new Set();
  if (["netflix","youtube","crunchyroll"].includes(icon) || /anime|phim|movie|stream/.test(text)) needs.add("movies");
  if (icon === "spotify" || /music|nhạc/.test(text)) needs.add("music");
  if (["cake","elsa","duolingo","grammarly","quilbot"].includes(icon) || /english|tiếng anh|phát âm|pronunciation|speaking|grammar|writing/.test(text)) needs.add("english");
  if (/chatgpt|gemini|quizlet|quilbot|quillbot|grammarly|ai|study|học|tutor|writing/.test(text)) needs.add("ai");
  if (["meitu","capcut","lightroom"].includes(icon) || /edit|photo|ảnh/.test(text)) needs.add("creative");
  if (["office365","discord"].includes(icon) || /microsoft|365|onedrive|word|excel|work/.test(text)) needs.add("office");
  if (["netflix","cake"].includes(icon)) needs.delete("office");
  if (icon === "cake") needs.delete("creative");
  return needs;
}
function trustLabels(product){
  const text = [
    product.name.vi, product.name.en, product.desc.vi, product.desc.en,
    ...(product.details?.vi || []), ...(product.details?.en || [])
  ].join(" ").toLowerCase();
  const tags = [];
  const add = (vi, en) => { if (!tags.some(t => t.vi === vi)) tags.push({ vi, en }); };
  if (product.icon === "youtube") add("Up chính chủ", "Own account");
  if (text.includes("chính chủ") || text.includes("own account")) add("Up chính chủ", "Own account");
  if (text.includes("không cần log") || text.includes("no login") || text.includes("không cần mật khẩu") || text.includes("no password")) add("Không cần mật khẩu", "No password");
  if (text.includes("account riêng") || text.includes("private account") || text.includes("không share")) add("Tài khoản riêng", "Private account");
  if (text.includes("bảo hành full") || text.includes("full warranty") || text.includes("bảo hành 1 năm")) add("Full bảo hành", "Full warranty");
  if (text.includes("mã pin") || text.includes("pin")) add("Có mã PIN", "PIN protected");
  if (text.includes("2tb") || text.includes("1tb")) add("Kèm lưu trữ", "Storage included");
  if (text.includes("5 thiết bị") || text.includes("multiple devices")) add("Nhiều thiết bị", "Multi-device");
  if (!tags.length) add("Shop hỗ trợ", "Shop support");
  return tags.slice(0, 3);
}
function trustTagHtml(product){
  return `<div class="trust-tags">${trustLabels(product).map(tag => `<span class="trust-tag">${tag[lang]}</span>`).join("")}</div>`;
}
function renderProductTools(){
  const search = $("#productSearch");
  const sort = $("#productSort");
  const needs = $("#needFilters");
  search.placeholder = t("searchPh");
  search.value = productQuery;
  sort.innerHTML = `
    <option value="default">${t("sortDefault")}</option>
    <option value="low">${t("sortLow")}</option>
    <option value="high">${t("sortHigh")}</option>`;
  sort.value = productSort;
  needs.innerHTML = NEED_FILTERS.map(f =>
    `<button class="need-chip ${productNeed === f.key ? "active" : ""}" type="button" data-need="${f.key}">${t(f.label)}</button>`).join("");
}
function renderProducts(){
  const grid = $("#productGrid");
  grid.innerHTML = "";
  const old = grid.parentElement.querySelector(".more-banner");
  if (old) old.remove();

  const query = productQuery.trim().toLocaleLowerCase(lang === "vi" ? "vi" : "en");
  let items = CONFIG.products.map((p, i) => ({ p, i, min: cheapestPlan(p).price }))
    .filter(({p}) => {
      if (productNeed !== "all" && !productNeeds(p).has(productNeed)) return false;
      if (!query) return true;
      const haystack = [p.name[lang], p.desc[lang], ...(p.details?.[lang] || [])].join(" ").toLocaleLowerCase(lang === "vi" ? "vi" : "en");
      return haystack.includes(query);
    });
  if (productSort === "low") items.sort((a,b) => a.min - b.min);
  if (productSort === "high") items.sort((a,b) => b.min - a.min);

  $("#productCount").textContent = t("productCount")
    .replace("{n}", items.length).replace("{total}", CONFIG.products.length);

  if (!items.length){
    grid.innerHTML = `<div class="no-results reveal">${t("noResults")}</div>`;
    observeReveals();
    return;
  }

  items.forEach(({p, i}) => {
    const plan = cheapestPlan(p);
    const hasCompare = Number(plan.oldPrice) > Number(plan.price);
    const el = document.createElement("article");
    el.className = "card reveal" + (p.featured ? " featured" : "");
    el.innerHTML = `
      ${p.badge[lang] ? `<span class="badge">${p.badge[lang]}</span>` : ""}
      ${iconTile(p.icon)}

function isYoutubeAnnual(){
  const plan = cur?.plans?.[curPlan];
  return cur?.icon === "youtube" && Number(plan?.price) === 59 && /12/.test(plan?.label?.vi || "");

function isSpotifyAnnual(){
  const plan = cur?.plans?.[curPlan];
  return cur?.icon === "spotify" && Number(plan?.price) === 39 && /12/.test(plan?.label?.vi || "");
}
function isNetflixAnnual(){
  const plan = cur?.plans?.[curPlan];
  return cur?.icon === "netflix" && /12/.test(plan?.label?.vi || "");
}
function availableComboDeals(){
  if (!isYoutubeAnnual() && !isSpotifyAnnual() && !isNetflixAnnual()) return [];
  const planLabel = cur?.plans?.[curPlan]?.label?.vi || "";
  return Object.entries(COMBO_DEALS).filter(([key, deal]) => {
    if (!deal.triggers.includes(cur.icon)) return false;
    if (cur.icon === "netflix") {
      if (/Premium/.test(planLabel)) return key === "netflixPremium";
      if (/VIP/.test(planLabel)) return key === "netflixVip";
      return false;
    }
    return true;
  });
}
function comboDealTitle(key, deal){
  if ((cur.icon === "spotify" && key === "spotifyYoutube") || cur.icon === "netflix") {
    return lang === "vi" ? "Thêm YouTube Premium" : "Add YouTube Premium";
  }
  return deal.title[lang];
}
function comboHtml(){
  const deals = availableComboDeals();
  if (!deals.length) return "";
  const bestSave = Math.max(...deals.map(([, deal]) => deal.original - deal.items.reduce((sum, item) => sum + item.price, 0)));
  const intro = lang === "vi"
    ? { title:"Gợi ý combo tiết kiệm", sub:"Nếu khách đang dùng thêm app khác, chọn kèm để cả 2 gói đều có giá mềm hơn.", badge:"Ưu đãi nhẹ" }
    : { title:"Suggested bundle", sub:"If you also use another app, add it and both plans get a softer price.", badge:"Soft upsell" };
  return `<div class="combo-box" id="comboBox">
    <div class="combo-top">
      <div><b>${intro.title}</b><p>${intro.sub}</p></div>
      <span class="combo-pill">${intro.badge}</span>
    </div>
    ${deals.map(([key, deal]) => {
      const total = deal.items.reduce((sum, item) => sum + item.price, 0);
      const save = deal.original - total;
      const isBest = save === bestSave && save > 0;
      return `<label class="combo-option ${selectedCombo === key ? "sel" : ""} ${isBest ? "best-combo" : ""}" data-combo="${key}">
        <input type="radio" name="comboDeal" ${selectedCombo === key ? "checked" : ""}>
        <span>${isBest ? `<span class="combo-best">${t("bestCombo")}</span><br>` : ""}<span class="combo-name">${comboDealTitle(key, deal)}</span><span class="combo-note">${deal.note[lang]}</span></span>
        <span class="combo-price">${money(total)}<br><span class="saving">${t("save")} ${money(save)}</span></span>
      </label>`;
    }).join("")}
  </div>`;
}
function bindComboEvents(){
  mBody.querySelectorAll(".combo-option").forEach(option => option.addEventListener("click", (e) => {
    e.preventDefault();
    const clickedCombo = option.dataset.combo;
    const shouldUnselect = selectedCombo === clickedCombo;
    mBody.querySelectorAll(".combo-option").forEach(x => x.classList.remove("sel"));
    mBody.querySelectorAll(".combo-option input").forEach(input => input.checked = false);
    selectedCombo = shouldUnselect ? "" : clickedCombo;

function orderPricing(plan){

  const total = deal.items.reduce((sum, item) => sum + item.price, 0);

  return {
    total,
    original: deal.original,
    planLabel: deal.plan[lang],
    productLabel: deal.product,
    summary: `${deal.plan[lang]} · ${itemSummary}`,
    sheetProduct: deal.product,

}

function makeCode(prefix){
  const d = new Date();
  const ymd = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
  const rand = Math.random().toString(36).slice(2,6).toUpperCase();
  return `${prefix}-${ymd}-${rand}`;
}

function melbourneTimestamp(date = new Date()){
  const parts = new Intl.DateTimeFormat("en-AU", {
    timeZone: "Australia/Melbourne",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hourCycle: "h23",
    timeZoneName: "short"
  }).formatToParts(date).reduce((acc, part) => {
    acc[part.type] = part.value;
    return acc;
  }, {});
  return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} ${parts.timeZoneName || "Melbourne"} (Melbourne)`;
}

/* ---------- scroll animation / back to top ---------- */
let revealObserver = null;
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if (!reduceMotion && "IntersectionObserver" in window){
  document.body.classList.add("motion-ready");
  revealObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting){
        entry.target.classList.add("is-visible");
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold:.12, rootMargin:"0px 0px -45px 0px" });
}
function observeReveals(){
  const nodes = document.querySelectorAll(".reveal:not(.is-visible)");
  if (!revealObserver){ nodes.forEach(n => n.classList.add("is-visible")); return; }
  nodes.forEach((n, i) => {
    n.style.transitionDelay = `${Math.min(i % 6, 5) * 55}ms`;
    revealObserver.observe(n);
  });
}
const backTop = $("#backTop");
window.addEventListener("scroll", () => backTop.classList.toggle("show", window.scrollY > 650), { passive:true });
backTop.addEventListener("click", () => window.scrollTo({ top:0, behavior:reduceMotion ? "auto" : "smooth" }));

  const name = recentNames[recentIndex % recentNames.length];
  const plan = cheapestPlan(product);
  $("#recentDot").textContent = name.replace(".", "").split(/\s+/).map(x => x[0]).join("").slice(0,2).toUpperCase();
  $("#recentTitle").textContent = lang === "vi" ? `${name} vừa đặt ${product.name[lang]}` : `${name} just ordered ${product.name[lang]}`;
  $("#recentMeta").textContent = lang === "vi"
    ? `${plan.label[lang]} · shop đang xử lý`
    : `${plan.label[lang]} · processing now`;
  box.classList.add("show");
  recentIndex++;
  setTimeout(() => box.classList.remove("show"), 5200);
}
setTimeout(showRecentOrder, 9000);
setInterval(showRecentOrder, 26000);

/* ---------- khởi động / boot ---------- */
renderLang();
renderWelcomeText();
if (!store.get("hzn_seen")){
  welcome.classList.add("open");
  document.body.style.overflow = "hidden";
}
</script>
</body>
