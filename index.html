<!DOCTYPE html>
<html lang="vi">
<head>

   <script async defer src="https://tools.luckyorange.com/core/lo.js?site-id=4c9d6a18"></script>
   
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAZELNUTTUNES — Giá sỉ phần mềm bản quyền</title>
<meta name="description" content="HAZELNUTTUNES — Nâng cấp YouTube Premium, Netflix, ChatGPT, Spotify giá sỉ. Uy tín để chọn, chất lượng để tin. Nâng cấp trước, trả sau.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MÀU SẮC & KIỂU CHỮ (COLORS & TYPE) — sửa ở đây để đổi màu
   ============================================================ */
:root{
  --midnight:#0A1128; --panel:#141E48; --panel-2:#1B2757;
  --line:rgba(233,180,76,.22);
  --gold:#E9B44C; --gold-deep:#C68A2E;
  --cream:#F7ECD7; --ink:#2B1D0E; --muted:#A9B4D8; --ok:#7BD88F;
  --radius:18px;
  --display:'Baloo 2',system-ui,sans-serif;
  --body:'Be Vietnam Pro',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);color:var(--cream);background:var(--midnight);
  background-image:
    radial-gradient(900px 500px at 85% -10%, rgba(233,180,76,.14), transparent 60%),
    radial-gradient(700px 420px at -10% 30%, rgba(60,90,200,.20), transparent 60%),
    radial-gradient(800px 600px at 50% 110%, rgba(233,180,76,.08), transparent 55%);
  min-height:100vh;line-height:1.6}
img{max-width:100%;display:block}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(10,17,40,.78);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;gap:10px;padding:10px 20px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;letter-spacing:.04em;font-size:1.02rem;color:var(--cream)}
.brand img{width:38px;height:38px}
.topbar nav{margin-left:auto;display:flex;gap:8px;align-items:center}
.pillbtn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;font-weight:600;font-size:.9rem;border:1px solid var(--line);color:var(--cream);background:transparent;transition:.2s}
.pillbtn:hover{background:var(--panel-2)}
.pillbtn.gold{background:linear-gradient(180deg,#F3C868,var(--gold-deep));color:var(--ink);border:none;box-shadow:0 4px 14px rgba(233,180,76,.35)}
.pillbtn.gold:hover{filter:brightness(1.06)}
.langbtn{border:1px solid var(--line);background:var(--panel);color:var(--cream);border-radius:999px;padding:7px 14px;font-weight:700;font-size:.82rem;letter-spacing:.05em}
.langbtn:hover{background:var(--panel-2)}
@media(max-width:560px){.topbar .navtext{display:none}}

/* ---------- hero ---------- */
.hero{padding:60px 0 36px;text-align:center;position:relative}
.coin{width:165px;height:165px;margin:0 auto 18px;filter:drop-shadow(0 14px 30px rgba(233,180,76,.35));animation:bob 5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.eyebrow{display:inline-block;font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:6px 16px;margin-bottom:16px;background:rgba(233,180,76,.06)}
h1{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5.5vw,3.3rem);line-height:1.12}
h1 .g{background:linear-gradient(180deg,#F7DFA5,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.tagline{color:var(--muted);max-width:580px;margin:14px auto 26px;font-size:1.02rem}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.discount-strip{display:none;margin:20px auto 0;max-width:520px;background:rgba(123,216,143,.1);border:1px dashed rgba(123,216,143,.45);color:var(--ok);border-radius:12px;padding:10px 16px;font-size:.9rem;font-weight:600}
.discount-strip.show{display:block}

/* ---------- steps ---------- */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:42px 0 6px}
.step{background:rgba(20,30,72,.6);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px;text-align:left}
.step b{font-family:var(--display);font-size:1.02rem;display:block;margin:8px 0 4px}
.step p{font-size:.9rem;color:var(--muted)}
.stepnum{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#F3C868,var(--gold-deep));color:var(--ink);font-family:var(--display);font-weight:800}

/* ---------- sections / products ---------- */
section{padding:40px 0}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;flex-wrap:wrap}
h2{font-family:var(--display);font-weight:800;font-size:clamp(1.4rem,3vw,1.85rem)}
.sec-head span{color:var(--muted);font-size:.92rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.card{background:linear-gradient(180deg,var(--panel),rgba(20,30,72,.55));border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:10px;transition:.22s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);border-color:rgba(233,180,76,.5);box-shadow:0 14px 34px rgba(0,0,0,.35)}
.card .icon{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:1.5rem;background:rgba(233,180,76,.12);border:1px solid var(--line);overflow:hidden}
.card .icon svg{width:30px;height:30px}
.card .icon.brand{border:none;box-shadow:0 6px 16px rgba(0,0,0,.35)}

/* ---------- banner "còn nhiều app nữa" ---------- */
.more-banner{margin-top:20px;border:1px solid var(--line);border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(233,180,76,.08),rgba(60,90,200,.10));
  overflow:hidden}
.more-inner{display:flex;align-items:center;gap:18px;padding:22px 24px;flex-wrap:wrap}
.more-icon{font-size:2rem;flex-shrink:0}
.more-inner > div:nth-child(2){flex:1;min-width:200px}
.more-inner b{font-family:var(--display);font-size:1.05rem;display:block;margin-bottom:4px}
.more-inner p{color:var(--muted);font-size:.88rem;margin:0}
.more-btns{display:flex;gap:10px;flex-wrap:wrap}
.more-btns .pillbtn{padding:10px 18px;font-size:.88rem}
.card.featured{
  grid-column:span 2;
  background:
    linear-gradient(180deg, rgba(30,18,20,.92), rgba(20,30,72,.9)) padding-box,
    linear-gradient(135deg,#FF4E45,#F3C868,#FF4E45) border-box;
  border:2px solid transparent;
  box-shadow:0 18px 44px rgba(255,60,60,.22), 0 0 0 1px rgba(233,180,76,.15);
}
.card.featured:before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(420px 200px at 85% 0%, rgba(255,70,60,.22), transparent 65%)}
.card.featured:hover{transform:translateY(-4px);box-shadow:0 22px 54px rgba(255,60,60,.3)}
.card.featured .badge{background:linear-gradient(135deg,#FF4E45,#F3C868);color:#2B0E0E;border:none;font-size:.72rem;padding:5px 12px;box-shadow:0 4px 12px rgba(255,70,60,.4)}
.card.featured .price{font-size:1.5rem}
.card.featured h3{font-size:1.3rem}
@media(max-width:600px){.card.featured{grid-column:span 1}}
.card h3{font-family:var(--display);font-size:1.12rem;font-weight:700}
.card .desc{color:var(--muted);font-size:.88rem;flex:1}
.price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.price{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--gold)}
.oldprice{color:var(--muted);text-decoration:line-through;font-size:.85rem;font-weight:500}
.per{color:var(--muted);font-size:.8rem}
.badge{position:absolute;top:14px;right:14px;font-size:.68rem;font-weight:700;letter-spacing:.06em;background:rgba(123,216,143,.14);color:var(--ok);border:1px solid rgba(123,216,143,.35);padding:4px 10px;border-radius:999px}
.card .pillbtn{justify-content:center;margin-top:4px}
.card-price-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:24px}
.saving{display:inline-flex;align-items:center;gap:5px;color:var(--ok);font-size:.78rem;font-weight:700;background:rgba(123,216,143,.1);border:1px solid rgba(123,216,143,.28);padding:3px 9px;border-radius:999px}

/* ---------- hero social proof & app marquee ---------- */
.hero-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;max-width:720px;margin:28px auto 0}
.hero-stat{background:rgba(20,30,72,.58);border:1px solid var(--line);border-radius:16px;padding:14px 12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.hero-stat strong{display:block;font-family:var(--display);font-size:1.45rem;line-height:1.1;color:var(--gold)}
.hero-stat span{display:block;color:var(--muted);font-size:.76rem;margin-top:4px}
.app-marquee{max-width:880px;margin:26px auto 0;overflow:hidden;position:relative;border:1px solid var(--line);border-radius:16px;background:rgba(20,30,72,.42);padding:12px 0}
.app-marquee:before,.app-marquee:after{content:"";position:absolute;top:0;bottom:0;width:70px;z-index:2;pointer-events:none}
.app-marquee:before{left:0;background:linear-gradient(90deg,var(--midnight),transparent)}
.app-marquee:after{right:0;background:linear-gradient(-90deg,var(--midnight),transparent)}
.marquee-track{display:flex;width:max-content;gap:12px;animation:marquee 32s linear infinite}
.app-marquee:hover .marquee-track{animation-play-state:paused}
.marquee-item{display:flex;align-items:center;gap:9px;flex:0 0 auto;min-width:148px;padding:8px 12px;border-radius:12px;background:rgba(10,17,40,.55);border:1px solid rgba(233,180,76,.12);font-size:.82rem;font-weight:600;color:var(--cream)}
.marquee-item .icon{width:34px;height:34px;border-radius:10px;flex-shrink:0}
.marquee-item .icon svg{width:21px;height:21px}
@keyframes marquee{to{transform:translateX(calc(-50% - 6px))}}

/* ---------- product search & filter ---------- */
.product-tools{display:grid;grid-template-columns:minmax(0,1fr) 210px;gap:12px;margin:-4px 0 18px}
.searchbox{position:relative}
.searchbox:before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-52%);color:var(--gold);font-size:1.25rem;pointer-events:none}
.searchbox .field{padding-left:42px;margin:0}
.product-sort{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);background-position:calc(100% - 18px) 50%,calc(100% - 12px) 50%;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:38px}
.product-meta{grid-column:1/-1;color:var(--muted);font-size:.8rem;margin-top:-4px}
.no-results{grid-column:1/-1;text-align:center;padding:34px 20px;border:1px dashed var(--line);border-radius:var(--radius);color:var(--muted);background:rgba(20,30,72,.35)}

/* ---------- testimonials ---------- */
.testimonials{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.review{background:linear-gradient(180deg,rgba(20,30,72,.72),rgba(20,30,72,.45));border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:13px}
.review-stars{color:var(--gold);letter-spacing:.08em;font-size:.95rem}
.review-text{color:var(--cream);font-size:.9rem;flex:1}
.review-person{display:flex;align-items:center;gap:10px}
.review-avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#7C5CFF);color:#10162F;font-family:var(--display);font-weight:800;border:2px solid rgba(255,255,255,.18);overflow:hidden}
.review-avatar img{width:100%;height:100%;object-fit:cover}
.review-person b{display:block;font-size:.88rem}
.review-person span{display:block;color:var(--muted);font-size:.75rem}

/* ---------- scroll reveal ---------- */
.reveal{opacity:1;transform:none}
.motion-ready .reveal{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s cubic-bezier(.2,.7,.2,1)}
.motion-ready .reveal.is-visible{opacity:1;transform:none}

/* ---------- floating actions ---------- */
.floating-contact{position:fixed;right:18px;bottom:88px;z-index:70;display:grid;gap:10px}
.float-btn,.back-top{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.2);color:#fff;font-weight:800;box-shadow:0 10px 28px rgba(0,0,0,.38);transition:.2s}
.float-btn:hover,.back-top:hover{transform:translateY(-3px);filter:brightness(1.08)}
.float-btn.messenger{background:#1877F2}
.float-btn.zalo-float{background:#0068FF}
.back-top{position:fixed;right:18px;bottom:28px;z-index:70;background:var(--panel-2);font-size:1.1rem;opacity:0;visibility:hidden;transform:translateY(8px);cursor:pointer}
.back-top.show{opacity:1;visibility:visible;transform:none}
.mobile-cta{display:none}

/* ---------- benefits ---------- */
.trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.trust .t{background:rgba(20,30,72,.5);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.trust .t b{font-family:var(--display)}
.trust .t p{color:var(--muted);font-size:.88rem;margin-top:4px}

/* ---------- FAQ ---------- */
.faq details{border:1px solid var(--line);border-radius:14px;background:rgba(20,30,72,.5);margin-bottom:10px;overflow:hidden}
.faq summary{cursor:pointer;list-style:none;padding:16px 18px;font-weight:600;font-size:.98rem;display:flex;align-items:center;gap:10px}
.faq summary::-webkit-details-marker{display:none}
.faq summary:before{content:"＋";color:var(--gold);font-weight:800;font-family:var(--display)}
.faq details[open] summary:before{content:"－"}
.faq .ans{padding:0 18px 16px 44px;color:var(--muted);font-size:.9rem}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);padding:30px 0 44px;color:var(--muted);font-size:.88rem;text-align:center}
footer .brand{justify-content:center;margin-bottom:8px}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,9,24,.74);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#18234F,var(--panel));border:1px solid var(--line);border-radius:22px 22px 0 0;width:min(560px,100%);max-height:92vh;overflow:auto;padding:26px 24px 30px;position:relative;animation:slideup .28s ease}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.modal{border-radius:22px}}
.modal .close{position:absolute;top:14px;right:14px;background:var(--panel-2);border:1px solid var(--line);color:var(--cream);width:36px;height:36px;border-radius:50%;font-size:1rem;z-index:2}
.modal h3{font-family:var(--display);font-size:1.32rem;margin-bottom:4px}
.modal .sub{color:var(--muted);font-size:.9rem;margin-bottom:16px}
.dline{font-size:.88rem;margin:4px 0}
.plan{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;background:rgba(10,17,40,.4);cursor:pointer;transition:.15s}
.plan:hover{border-color:rgba(233,180,76,.5)}
.plan.sel{border-color:var(--gold);background:rgba(233,180,76,.1)}
.plan input{accent-color:var(--gold);width:18px;height:18px;flex-shrink:0}
.plan .pl-name{font-weight:600;font-size:.95rem}
.plan .pl-note{color:var(--muted);font-size:.8rem}
.plan .pl-price{margin-left:auto;font-family:var(--display);font-weight:800;color:var(--gold);text-align:right;white-space:nowrap}
.note-box{background:rgba(233,180,76,.08);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:.85rem;margin:14px 0}
label{display:block;font-weight:600;font-size:.88rem;margin:14px 0 6px}
.field{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:rgba(10,17,40,.55);color:var(--cream);font-family:inherit;font-size:.95rem}
.field:focus{outline:2px solid var(--gold);border-color:transparent}
.err{color:#FF9C9C;font-size:.8rem;margin-top:4px;display:none}
.wide{width:100%;justify-content:center;padding:13px;font-size:1rem;margin-top:18px}

/* ---------- golden ticket ---------- */
.ticket{background:linear-gradient(160deg,#F7DFA5,#E9B44C 55%,#D69A36);color:var(--ink);border-radius:18px;padding:22px;margin:6px 0 16px;position:relative;box-shadow:0 16px 40px rgba(233,180,76,.28)}
.ticket:after{content:"";position:absolute;left:14px;right:14px;top:96px;border-top:2px dashed rgba(43,29,14,.35)}
.ticket .tk-label{font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.75}
.ticket .tk-code{font-family:var(--display);font-weight:800;font-size:1.85rem;letter-spacing:.05em;line-height:1.2}
.ticket .tk-body{margin-top:30px;font-size:.9rem;display:grid;gap:4px}
.copybtn{background:var(--ink);color:var(--cream);border:none;border-radius:999px;padding:9px 18px;font-weight:600;font-size:.85rem;margin-top:14px}
.contact-btns{display:grid;gap:10px;margin-top:6px}
.contact-btns .pillbtn{justify-content:center;padding:13px;font-size:.98rem}
.fb{background:#1877F2;color:#fff;border:none}.fb:hover{filter:brightness(1.08);background:#1877F2}
.zalo{background:#0068FF;color:#fff;border:none}.zalo:hover{filter:brightness(1.08);background:#0068FF}
.mini{color:var(--muted);font-size:.8rem;text-align:center;margin-top:12px}

/* ---------- welcome popup ---------- */
.welcome{position:fixed;inset:0;background:rgba(5,9,24,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.welcome.open{display:flex}
.wbox{background:linear-gradient(180deg,#18234F,var(--panel));border:1px solid var(--line);border-radius:22px;width:min(430px,100%);padding:30px 26px;text-align:center;animation:slideup .3s ease}
.wbox img{width:110px;height:110px;margin:0 auto 12px}
.wbox h3{font-family:var(--display);font-size:1.3rem;margin-bottom:6px}
.wbox p{color:var(--muted);font-size:.9rem;margin-bottom:16px}
.langpick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.langpick button{padding:13px;border-radius:14px;border:1px solid var(--line);background:rgba(10,17,40,.5);color:var(--cream);font-weight:700;font-size:.95rem;transition:.15s}
.langpick button.sel{border-color:var(--gold);background:rgba(233,180,76,.12);color:var(--gold)}
.wbox .field{text-align:center}
.skip{background:none;border:none;color:var(--muted);font-size:.82rem;margin-top:12px;text-decoration:underline}
.gift{background:rgba(123,216,143,.1);border:1px dashed rgba(123,216,143,.45);border-radius:12px;padding:12px;margin-top:14px;display:none}
.gift.show{display:block}
.gift .code{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--ok);letter-spacing:.06em}

@media(max-width:760px){
  body{padding-bottom:74px}
  .steps{grid-template-columns:1fr}.hero{padding-top:40px}
  .hero-stats{grid-template-columns:1fr 1fr}.hero-stat:last-child{grid-column:1/-1}
  .product-tools{grid-template-columns:1fr}
  .product-meta{grid-column:1}
  .floating-contact{right:14px;bottom:88px}
  .back-top{right:14px;bottom:146px}
  .mobile-cta{position:fixed;left:0;right:0;bottom:0;z-index:75;display:grid;grid-template-columns:1fr 1.1fr;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(10,17,40,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line)}
  .mobile-cta .pillbtn{justify-content:center;padding:11px 10px;font-size:.82rem}
}
@media(max-width:460px){.hero-stats{grid-template-columns:1fr}.hero-stat:last-child{grid-column:auto}.marquee-item{min-width:132px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}html{scroll-behavior:auto}.motion-ready .reveal{opacity:1!important;transform:none!important}}
</style>
</head>
<body>

<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <div class="wrap">
    <span class="brand"><img id="logoTop" alt="Logo HAZELNUTTUNES"><span class="navtext">HAZELNUTTUNES</span></span>
    <nav>
      <a class="pillbtn navtext" href="#sanpham" data-t="navPrices"></a>
      <a class="pillbtn navtext" href="#faq">FAQ</a>
      <button class="langbtn" id="langToggle" aria-label="Change language">🌐 VI</button>
      <a class="pillbtn gold" id="zaloTop" href="#" target="_blank" rel="noopener">💬 Zalo</a>
    </nav>
  </div>
</header>

<main>
<div class="wrap">

function iconTile(key){
  const b = ICONS[key];
  if (b && b.svg) return `<div class="icon brand" style="background:${b.bg}">${b.svg}</div>`;
  if (b && b.img) return `<div class="icon brand" style="background:${b.bg}"><img src="${b.img}" style="width:100%;height:100%;object-fit:${b.fit || 'contain'};padding:${b.pad || '0'};border-radius:${b.radius || '14px'};box-sizing:border-box" alt=""></div>`;
  return `<div class="icon">${key}</div>`;   // emoji fallback
}

/* ---------- tiện ích / helpers ---------- */
const $ = s => document.querySelector(s);
const money = n => CONFIG.currency + (Number.isInteger(n) ? n : n.toFixed(2));
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
};
let lang = store.get("hzn_lang") || "vi";
let discountCode = store.get("hzn_discount") || "";
const t = k => T[lang][k];

/* ---------- logo ---------- */
["logoTop","logoHero","logoFoot","logoWelcome"].forEach(id => document.getElementById(id).src = LOGO);
$("#zaloTop").href = CONFIG.zaloLink;
$("#fbHero").href = CONFIG.facebookLink;
$("#fbPageHero").href = CONFIG.facebookPageLink;
$("#facebookPageFoot").href = CONFIG.facebookPageLink;
$("#floatingMessenger").href = CONFIG.facebookLink;
$("#floatingZalo").href = CONFIG.zaloLink;
$("#mobileChat").href = CONFIG.facebookLink;

/* ---------- vẽ giao diện theo ngôn ngữ / render language ---------- */
function renderLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-t]").forEach(el => { el.innerHTML = t(el.dataset.t); });
  $("#heroTitle").innerHTML = t("heroTitle");
  $("#taglineText").textContent = CONFIG.tagline[lang];
  $("#langToggle").textContent = lang === "vi" ? "🌐 EN" : "🌐 VI";
  $("#footText").textContent = "© " + new Date().getFullYear() + " " + CONFIG.shopName + " · " + CONFIG.footerText[lang];
  renderProductTools(); renderProducts(); renderBenefits(); renderFaq(); renderDiscountStrip();
  renderHeroStats(); renderMarquee(); renderTestimonials();
  observeReveals();
}
$("#langToggle").onclick = () => { lang = lang === "vi" ? "en" : "vi"; store.set("hzn_lang", lang); renderLang(); };

function renderDiscountStrip(){
  const s = $("#discountStrip");
  if (discountCode){
    s.textContent = t("discountStrip").replace("{p}", CONFIG.discountPercent).replace("{c}", discountCode);
    s.classList.add("show");
  } else s.classList.remove("show");
}

/* ---------- hero stats / app marquee ---------- */
function renderHeroStats(){
  $("#heroStats").innerHTML = (CONFIG.heroStats || []).map(s =>
    `<div class="hero-stat reveal"><strong>${s.value}</strong><span>${s.label[lang]}</span></div>`).join("");
}
function renderMarquee(){
  const items = CONFIG.products.slice(0, 10).map(p =>
    `<div class="marquee-item">${iconTile(p.icon)}<span>${p.name[lang]}</span></div>`).join("");
  $("#appMarquee").innerHTML = `<div class="marquee-track">${items}${items}</div>`;
}

/* ---------- sản phẩm / products ---------- */
let productQuery = "";
let productSort = "default";
const cheapestPlan = p => p.plans.reduce((best, pl) => pl.price < best.price ? pl : best, p.plans[0]);
function renderProductTools(){
  const search = $("#productSearch");
  const sort = $("#productSort");
  search.placeholder = t("searchPh");
  search.value = productQuery;
  sort.innerHTML = `
    <option value="default">${t("sortDefault")}</option>
    <option value="low">${t("sortLow")}</option>
    <option value="high">${t("sortHigh")}</option>`;
  sort.value = productSort;
}
function renderProducts(){
  const grid = $("#productGrid");
  grid.innerHTML = "";
  const old = grid.parentElement.querySelector(".more-banner");
  if (old) old.remove();

  const query = productQuery.trim().toLocaleLowerCase(lang === "vi" ? "vi" : "en");
  let items = CONFIG.products.map((p, i) => ({ p, i, min: cheapestPlan(p).price }))
    .filter(({p}) => {
      if (!query) return true;
      const haystack = [p.name[lang], p.desc[lang], ...(p.details?.[lang] || [])].join(" ").toLocaleLowerCase(lang === "vi" ? "vi" : "en");
      return haystack.includes(query);
    });
  if (productSort === "low") items.sort((a,b) => a.min - b.min);
  if (productSort === "high") items.sort((a,b) => b.min - a.min);

  $("#productCount").textContent = t("productCount")
    .replace("{n}", items.length).replace("{total}", CONFIG.products.length);

  if (!items.length){
    grid.innerHTML = `<div class="no-results reveal">${t("noResults")}</div>`;
    observeReveals();
    return;
  }

  items.forEach(({p, i}) => {
    const plan = cheapestPlan(p);
    const hasCompare = Number(plan.oldPrice) > Number(plan.price);
    const el = document.createElement("article");
    el.className = "card reveal" + (p.featured ? " featured" : "");
    el.innerHTML = `
      ${p.badge[lang] ? `<span class="badge">${p.badge[lang]}</span>` : ""}
      ${iconTile(p.icon)}
      <h3>${p.name[lang]}</h3>
      <p class="desc">${p.desc[lang]}</p>
      <div class="price-row">
        <span class="per">${t("from")}</span><span class="price">${money(plan.price)}</span>
        ${hasCompare ? `<span class="oldprice">${money(plan.oldPrice)}</span>` : ""}
      </div>
      <div class="card-price-meta">${hasCompare ? `<span class="saving">${t("save")} ${money(plan.oldPrice - plan.price)}</span>` : ""}</div>
      <button class="pillbtn gold" data-i="${i}">${t("order")}</button>`;
    grid.appendChild(el);
  });

  if (!query){
    const banner = document.createElement("div");
    banner.className = "more-banner reveal";
    banner.innerHTML = lang === "vi"
      ? `<div class="more-inner">
          <div class="more-icon">✨</div>
          <div><b>Còn nhiều app khác chưa hiển thị hết!</b><p>Shop còn nhiều dịch vụ khác: LinkedIn Premium, Adobe, Canva, Amazon Prime... Nhắn cho tụi mình để được tư vấn và báo giá chi tiết nhé.</p></div>
          <div class="more-btns"><a class="pillbtn fb" href="${CONFIG.facebookLink}" target="_blank" rel="noopener">💬 Nhắn Messenger</a><a class="pillbtn zalo" href="${CONFIG.zaloLink}" target="_blank" rel="noopener">💬 Nhắn Zalo</a></div>
        </div>`
      : `<div class="more-inner">
          <div class="more-icon">✨</div>
          <div><b>Even more apps available!</b><p>We also offer LinkedIn Premium, Adobe, Canva, Amazon Prime and many more. Message us for the full list and pricing.</p></div>
          <div class="more-btns"><a class="pillbtn fb" href="${CONFIG.facebookLink}" target="_blank" rel="noopener">💬 Messenger</a><a class="pillbtn zalo" href="${CONFIG.zaloLink}" target="_blank" rel="noopener">💬 Zalo</a></div>
        </div>`;
    grid.parentElement.appendChild(banner);
  }
  observeReveals();
}$("#productGrid").addEventListener("click", e => {
  const b = e.target.closest("button[data-i]");
  if (b) openOrder(+b.dataset.i);
});
$("#productSearch").addEventListener("input", e => {
  productQuery = e.target.value;
  renderProducts();
});
$("#productSort").addEventListener("change", e => {
  productSort = e.target.value;
  renderProducts();
});

/* ---------- quyền lợi / benefits ---------- */
function renderBenefits(){
  $("#benefitGrid").innerHTML = CONFIG.benefits.map(b =>
    `<div class="t reveal"><b>${b.icon} ${b.t[lang]}</b><p>${b.p[lang]}</p></div>`).join("");
}

/* ---------- testimonials ---------- */
function initials(name){
  return name.trim().split(/\s+/).slice(-2).map(x => x[0] || "").join("").toUpperCase();
}
function renderTestimonials(){
  const section = $("#danhgia");
  const reviews = (CONFIG.testimonials || []).filter(r => r && r.name && r.text?.[lang]);
  section.hidden = reviews.length === 0;
  if (!reviews.length){ $("#testimonialGrid").innerHTML = ""; return; }
  $("#testimonialGrid").innerHTML = reviews.map(r => `
    <article class="review reveal">
      <div class="review-stars" aria-label="${Math.max(1, Math.min(5, r.stars || 5))} stars">${"★".repeat(Math.max(1, Math.min(5, r.stars || 5)))}</div>
      <p class="review-text">“${r.text[lang]}”</p>
      <div class="review-person">
        <div class="review-avatar">${r.avatar ? `<img src="${r.avatar}" alt="">` : initials(r.name)}</div>
        <div><b>${r.name}</b><span>${r.product || ""}</span></div>
      </div>
    </article>`).join("");
}

/* ---------- FAQ ---------- */
function renderFaq(){
  $("#faqList").innerHTML = CONFIG.faq.map(f =>
    `<details class="reveal"><summary>${f.q[lang]}</summary><div class="ans">${f.a[lang]}</div></details>`).join("");
}

/* ---------- modal đặt hàng / order modal ---------- */
const overlay = $("#overlay"), mBody = $("#mBody");
let cur = null, curPlan = 0;
function openOrder(i){ cur = CONFIG.products[i]; curPlan = 0; renderStep1(); overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
function closeModal(){ overlay.classList.remove("open"); document.body.style.overflow = ""; }
$("#mClose").onclick = closeModal;
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function renderStep1(){
  mBody.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      ${iconTile(cur.icon)}
      <h3 id="mTitle" style="margin:0">${cur.name[lang]}</h3>
    </div>
    <p class="sub">${cur.desc[lang]}</p>
    ${cur.details[lang].map(d => `<p class="dline">✔️ ${d}</p>`).join("")}
    <label style="margin-top:18px">${t("choosePlan")}</label>
    ${cur.plans.map((pl, idx) => `
      <label class="plan ${idx===0?"sel":""}" data-idx="${idx}">
        <input type="radio" name="plan" ${idx===0?"checked":""}>
        <span><span class="pl-name">${pl.label[lang]}</span>${pl.note[lang]?`<br><span class="pl-note">${pl.note[lang]}</span>`:""}</span>
        <span class="pl-price">${money(pl.price)}${pl.oldPrice?`<br><span class="oldprice">${money(pl.oldPrice)}</span><br><span class="saving">${t("save")} ${money(pl.oldPrice-pl.price)}</span>`:""}</span>
      </label>`).join("")}
    <div class="note-box">🤝 ${t("payLater")}</div>
    <button class="pillbtn gold wide" id="toStep2">${t("cont")}</button>`;
  mBody.querySelectorAll(".plan").forEach(pl => pl.addEventListener("click", () => {
    mBody.querySelectorAll(".plan").forEach(x => x.classList.remove("sel"));
    pl.classList.add("sel"); pl.querySelector("input").checked = true;
    curPlan = +pl.dataset.idx;
  }));
  $("#toStep2").onclick = renderStep2;
}

function renderStep2(){
  const pl = cur.plans[curPlan];
  mBody.innerHTML = `
    <h3 id="mTitle">${t("yourInfo")}</h3>
    <p class="sub">${cur.name[lang]} · ${pl.label[lang]} · <b style="color:var(--gold)">${money(pl.price)}</b></p>
    <label for="fName">${t("fullName")}</label>
    <input class="field" id="fName" placeholder="${t("namePh")}" autocomplete="name">
    <p class="err" id="eName">${t("errName")}</p>
    <label for="fPhone">${t("phone")}</label>
    <input class="field" id="fPhone" placeholder="${t("phonePh")}" inputmode="tel" autocomplete="tel">
    <p class="err" id="ePhone">${t("errPhone")}</p>
    <label for="fNote">${t("noteLb")}</label>
    <input class="field" id="fNote" placeholder="${t("notePh")}">
    <button class="pillbtn gold wide" id="makeInvoice">${t("getCode")}</button>
    <p class="mini">${t("privacy")}</p>`;
  $("#makeInvoice").onclick = () => {
    const name = $("#fName").value.trim();
    const phone = $("#fPhone").value.replace(/[\s.-]/g, "");
    let ok = true;
    $("#eName").style.display = name ? "none" : "block"; if (!name) ok = false;
    const okPhone = /^\+?\d{9,11}$/.test(phone);
    $("#ePhone").style.display = okPhone ? "none" : "block"; if (!okPhone) ok = false;
    if (ok) renderStep3(name, phone, $("#fNote").value.trim());
  };
}

function makeCode(prefix){
  const d = new Date();
  const ymd = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
  const rand = Math.random().toString(36).slice(2,6).toUpperCase();
  return `${prefix}-${ymd}-${rand}`;
}

function sendToSheet(payload){
  if (!CONFIG.emailWebhook) return;
  fetch(CONFIG.emailWebhook, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

function renderStep3(name, phone, note){
  const pl = cur.plans[curPlan];
  const code = makeCode(CONFIG.invoicePrefix);
  const hasDisc = !!discountCode;
  const finalPrice = hasDisc ? +(pl.price * (100 - CONFIG.discountPercent) / 100).toFixed(2) : pl.price;
  const priceLine = hasDisc
    ? `${money(finalPrice)} <span class="oldprice">${money(pl.price)}</span> · ${t("discountApplied").replace("{p}", CONFIG.discountPercent)}`
    : money(pl.price);
  const msg =
`${t("mCode")}: ${code}
${t("mProduct")}: ${cur.name[lang]} — ${pl.label[lang]} (${money(finalPrice)})${hasDisc ? `\n${t("mDiscount")}: ${discountCode} (-${CONFIG.discountPercent}%)` : ""}
${t("mName")}: ${name}
${t("mPhone")}: ${phone}${note ? `\n${t("mNote")}: ${note}` : ""}`;

  sendToSheet({
    type: "order",
    code,
    product: cur.name[lang],
    plan: pl.label[lang],
    price: money(finalPrice),
    name,
    phone,
    note,
    discount: hasDisc ? discountCode : "",
    date: new Date().toISOString()
  });

  mBody.innerHTML = `
    <h3 id="mTitle">${t("ready")}</h3>
    <p class="sub">${t("readySub")}</p>
    <div class="ticket">
      <div class="tk-label">${t("orderCode")} · ${CONFIG.shopName}</div>
      <div class="tk-code">${code}</div>
      <div class="tk-body">
        <span><b>${cur.name[lang]}</b> — ${pl.label[lang]} · ${priceLine}</span>
        <span>${name} · ${phone}</span>
        ${note ? `<span>${t("mNote")}: ${note}</span>` : ""}
        ${hasDisc ? `<span>🎁 ${t("mDiscount")}: <b>${discountCode}</b></span>` : ""}
      </div>
      <button class="copybtn" id="copyMsg">${t("copy")}</button>
    </div>
    <div class="contact-btns">
      <a class="pillbtn fb" href="${CONFIG.facebookLink}" target="_blank" rel="noopener">${t("msgFb")}</a>
      <a class="pillbtn zalo" href="${CONFIG.zaloLink}" target="_blank" rel="noopener">${t("msgZalo")}</a>
      <a class="pillbtn" href="${CONFIG.facebookPageLink}" target="_blank" rel="noopener">${t("msgPage")}</a>
    </div>
    <p class="mini">${t("finalHint")}</p>`;

  $("#copyMsg").onclick = async (e) => {
    try { await navigator.clipboard.writeText(msg); }
    catch { const ta = document.createElement("textarea"); ta.value = msg; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
    e.target.textContent = t("copied");
    setTimeout(() => e.target.textContent = t("copy"), 2200);
  };
}

/* ---------- popup chào mừng / welcome popup ---------- */
const welcome = $("#welcome");
function renderWelcomeText(){
  $("#wOffer").innerHTML = t("wOffer").replace("{p}", CONFIG.discountPercent);
  $("#wGet").textContent = t("wGet").replace("{p}", CONFIG.discountPercent);
  $("#wSkip").textContent = t("wSkip");
  $("#wErr").textContent = t("wErr");
  $("#wGiftLabel").textContent = t("wGiftLabel");
  $("#wGiftNote").textContent = t("wGiftNote");
  $("#pickVi").classList.toggle("sel", lang === "vi");
  $("#pickEn").classList.toggle("sel", lang === "en");
}
$("#pickVi").onclick = () => { lang = "vi"; store.set("hzn_lang","vi"); renderLang(); renderWelcomeText(); };
$("#pickEn").onclick = () => { lang = "en"; store.set("hzn_lang","en"); renderLang(); renderWelcomeText(); };

$("#wGet").onclick = () => {
  const email = $("#wEmail").value.trim();
  const okEmail = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
  $("#wErr").style.display = okEmail ? "none" : "block";
  if (!okEmail) return;
  discountCode = makeCode(CONFIG.invoicePrefix + CONFIG.discountPercent);
  store.set("hzn_discount", discountCode);
  store.set("hzn_email", email);
  sendToSheet({
    type: "email",
    email,
    code: discountCode,
    lang,
    date: new Date().toISOString()
  });

  $("#wGiftCode").textContent = discountCode;
  $("#wGift").classList.add("show");
  $("#wEmail").style.display = "none"; $("#wGet").style.display = "none";
  $("#wSkip").textContent = t("wEnter");
  renderDiscountStrip();
};
$("#wSkip").onclick = () => { welcome.classList.remove("open"); document.body.style.overflow = ""; store.set("hzn_seen","1"); };

/* ---------- scroll animation / back to top ---------- */
let revealObserver = null;
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if (!reduceMotion && "IntersectionObserver" in window){
  document.body.classList.add("motion-ready");
  revealObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting){
        entry.target.classList.add("is-visible");
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold:.12, rootMargin:"0px 0px -45px 0px" });
}
function observeReveals(){
  const nodes = document.querySelectorAll(".reveal:not(.is-visible)");
  if (!revealObserver){ nodes.forEach(n => n.classList.add("is-visible")); return; }
  nodes.forEach((n, i) => {
    n.style.transitionDelay = `${Math.min(i % 6, 5) * 55}ms`;
    revealObserver.observe(n);
  });
}
const backTop = $("#backTop");
window.addEventListener("scroll", () => backTop.classList.toggle("show", window.scrollY > 650), { passive:true });
backTop.addEventListener("click", () => window.scrollTo({ top:0, behavior:reduceMotion ? "auto" : "smooth" }));

/* ---------- khởi động / boot ---------- */
renderLang();
renderWelcomeText();
if (!store.get("hzn_seen")){
  welcome.classList.add("open");
  document.body.style.overflow = "hidden";
}
</script>
</body>
</html>
